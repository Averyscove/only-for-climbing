<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>uClimb — Hi-Fi Mockups</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #d8d0c0; font-family: Inter, system-ui, sans-serif; }
  #root { height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi/shared.jsx"></script>
<script type="text/babel" src="hifi/feed.jsx"></script>
<script type="text/babel" src="hifi/profile.jsx"></script>
<script type="text/babel" src="hifi/events.jsx"></script>
<script type="text/babel" src="hifi/chat.jsx"></script>
<script type="text/babel" src="hifi/share.jsx"></script>
<script type="text/babel" src="hifi/extras.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const PHONE_W = 390;
const PHONE_H = 844;

function InPhone({ children, dark }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: 24 }}>
      <div style={{ transform: 'scale(0.94)', transformOrigin: 'top center' }}>
        <IOSDevice width={PHONE_W} height={PHONE_H} dark={dark}>
          {children}
        </IOSDevice>
      </div>
    </div>
  );
}

function CardArtboard({ children }) {
  return (
    <div style={{ width: 420, height: 800, background: '#d8d0c0', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, boxSizing: 'border-box' }}>
      <div style={{ width: 360, height: 720, boxShadow: '0 30px 60px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.15)' }}>{children}</div>
    </div>
  );
}

const AB_W = 440;
const AB_H = 920;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="overview" title="uClimb · Hi-Fi" subtitle="Hi-fidelity mockups w/ real photography. Gritty chalk + rock aesthetic. V-scale bouldering. Drag artboards to reorder · click label or expand to focus.">
        <DCArtboard id="onboard" label="01 · Onboarding" width={AB_W} height={AB_H}>
          <InPhone dark><HFOnboardingScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="feed" label="02 · Feed (hero send)" width={AB_W} height={AB_H}>
          <InPhone><HFFeedScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="story" label="03 · Story Viewer" width={AB_W} height={AB_H}>
          <InPhone dark><HFStoryView /></InPhone>
        </DCArtboard>
        <DCArtboard id="composer" label="04 · Log a Send" width={AB_W} height={AB_H}>
          <InPhone dark><HFComposerScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="profile" label="05 · Profile" width={AB_W} height={AB_H}>
          <InPhone><HFProfileScreen /></InPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="social" title="Social · Events · Map · Chat" subtitle="Plan climbs together, find the crew, group chats with embedded sends.">
        <DCArtboard id="events" label="06 · Events / Crag" width={AB_W} height={AB_H}>
          <InPhone><HFEventsScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="plan" label="07 · Plan a Climb" width={AB_W} height={AB_H}>
          <InPhone><HFPlanScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="map" label="08 · Map" width={AB_W} height={AB_H}>
          <InPhone><HFMapScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="chats" label="09 · Group Chats" width={AB_W} height={AB_H}>
          <InPhone><HFChatListScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="thread" label="10 · Crushers Crew" width={AB_W} height={AB_H}>
          <InPhone><HFGroupChatScreen /></InPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="hero" title="Hero · Achievement Share Cards" subtitle="The shareable moment when you log a send. Three takes — pick a direction or mix.">
        <DCArtboard id="cardA" label="A · STAMPED CERTIFICATE" width={420} height={800}>
          <CardArtboard><HFShareA /></CardArtboard>
        </DCArtboard>
        <DCArtboard id="cardB" label="B · EDITORIAL FULL-BLEED" width={420} height={800}>
          <CardArtboard><HFShareB /></CardArtboard>
        </DCArtboard>
        <DCArtboard id="cardC" label="C · DAILY NEWSPAPER" width={420} height={800}>
          <CardArtboard><HFShareC /></CardArtboard>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
