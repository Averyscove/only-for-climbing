<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>uClimb — Hi-Fi Mockups (Print)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #d8d0c0; font-family: Inter, system-ui, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .page {
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 24px 48px;
    box-sizing: border-box;
    break-after: page;
    page-break-after: always;
  }
  .page:last-child { break-after: auto; page-break-after: auto; }
  .page-h {
    width: 100%;
    max-width: 720px;
    border-bottom: 1.5px solid #1a1714;
    padding-bottom: 10px;
    margin-bottom: 18px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
    font-size: 10px;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    font-weight: 800;
    color: #1a1714;
  }
  .page-h .title { font-family: "Archivo Black", Inter, sans-serif; font-size: 16px; letter-spacing: -.3px; }
  .page-h .meta { color: #5e564b; }

  .section-page {
    align-items: flex-start;
    justify-content: flex-start;
    padding-top: 72px;
  }
  .section-page .kicker { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #5e564b; font-weight: 800; }
  .section-page .h1 { font-family: "Archivo Black", Inter, sans-serif; font-size: 56px; line-height: 1; letter-spacing: -1.5px; text-transform: uppercase; margin: 16px 0 12px; color: #13110e; }
  .section-page .sub { font-family: Inter, sans-serif; font-size: 14px; line-height: 1.55; color: #5e564b; max-width: 540px; }

  /* Phone scaling for print */
  .phoneWrap {
    transform: scale(0.78);
    transform-origin: top center;
  }
  /* Card artboard scaling for print */
  .cardWrap {
    transform: scale(0.8);
    transform-origin: top center;
  }

  @page { size: A4 portrait; margin: 0; }
  @media print {
    body { background: #d8d0c0 !important; }
    .page { min-height: 297mm; padding: 14mm 12mm 16mm; }
    .page-h { max-width: none; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="hifi/shared.jsx"></script>
<script type="text/babel" src="hifi/feed.jsx"></script>
<script type="text/babel" src="hifi/profile.jsx"></script>
<script type="text/babel" src="hifi/events.jsx"></script>
<script type="text/babel" src="hifi/chat.jsx"></script>
<script type="text/babel" src="hifi/share.jsx"></script>
<script type="text/babel" src="hifi/extras.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const PHONE_W = 390;
const PHONE_H = 844;

function PhonePage({ label, children, dark }) {
  return (
    <div className="page">
      <div className="page-h">
        <span className="title">{label}</span>
        <span className="meta">uClimb · Hi-Fi · APR 2026</span>
      </div>
      <div className="phoneWrap">
        <IOSDevice width={PHONE_W} height={PHONE_H} dark={dark}>
          {children}
        </IOSDevice>
      </div>
    </div>
  );
}

function CardPage({ label, children }) {
  return (
    <div className="page">
      <div className="page-h">
        <span className="title">{label}</span>
        <span className="meta">uClimb · Share Card · APR 2026</span>
      </div>
      <div className="cardWrap">
        <div style={{ width: 360, height: 720, boxShadow: '0 30px 60px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.15)' }}>{children}</div>
      </div>
    </div>
  );
}

function SectionPage({ kicker, title, sub }) {
  return (
    <div className="page section-page">
      <span className="kicker">{kicker}</span>
      <div className="h1">{title}</div>
      <div className="sub">{sub}</div>
    </div>
  );
}

function App() {
  return (
    <div>
      <SectionPage kicker="00 · Cover" title="uClimb Hi-Fi" sub="Hi-fidelity mockups for the uClimb climbing social app. Real photography, gritty chalk + rock aesthetic, V-scale bouldering. Each page below is one artboard from the design canvas." />

      <SectionPage kicker="Section 01" title="App · Hi-Fi" sub="Onboarding, feed, story viewer, the send composer, and profile." />
      <PhonePage label="01 · Onboarding" dark><HFOnboardingScreen /></PhonePage>
      <PhonePage label="02 · Feed (hero send)"><HFFeedScreen /></PhonePage>
      <PhonePage label="03 · Story Viewer" dark><HFStoryView /></PhonePage>
      <PhonePage label="04 · Log a Send" dark><HFComposerScreen /></PhonePage>
      <PhonePage label="05 · Profile"><HFProfileScreen /></PhonePage>

      <SectionPage kicker="Section 02" title="Social · Events · Map · Chat" sub="Plan climbs together, find the crew, group chats with embedded sends." />
      <PhonePage label="06 · Events / Crag"><HFEventsScreen /></PhonePage>
      <PhonePage label="07 · Plan a Climb"><HFPlanScreen /></PhonePage>
      <PhonePage label="08 · Map"><HFMapScreen /></PhonePage>
      <PhonePage label="09 · Group Chats"><HFChatListScreen /></PhonePage>
      <PhonePage label="10 · Crushers Crew"><HFGroupChatScreen /></PhonePage>

      <SectionPage kicker="Section 03" title="Hero · Achievement Share Cards" sub="The shareable moment when you log a send. Three takes — pick a direction or mix." />
      <CardPage label="A · Stamped Certificate"><HFShareA /></CardPage>
      <CardPage label="B · Editorial Full-Bleed"><HFShareB /></CardPage>
      <CardPage label="C · Daily Newspaper"><HFShareC /></CardPage>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Auto-print after fonts + Babel-transpiled scripts have rendered
(async () => {
  try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
  await new Promise(r => setTimeout(r, 1500));
  window.print();
})();
</script>
</body>
</html>
