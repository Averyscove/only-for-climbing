<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>uClimb — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: Inter, system-ui, sans-serif; }
  #root { height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/feed.jsx"></script>
<script type="text/babel" src="screens/achievements.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>
<script type="text/babel" src="screens/events.jsx"></script>
<script type="text/babel" src="screens/chat.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const PHONE_W = 390;
const PHONE_H = 844;

// Wrap any screen in the iOS device frame.
function InPhone({ children, dark }) {
  return (
    <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: 24 }}>
      <div style={{ transform: 'scale(0.94)', transformOrigin: 'top center' }}>
        <IOSDevice width={PHONE_W} height={PHONE_H} dark={dark}>
          {children}
        </IOSDevice>
      </div>
    </div>
  );
}

// Static (non-phone) artboard for share-card variants
function CardArtboard({ children }) {
  return (
    <div style={{ width: 360, height: 540, background: '#f0eee9', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, boxSizing: 'border-box' }}>
      <div style={{ width: '100%', height: '100%' }}>{children}</div>
    </div>
  );
}

const AB_W = 440;
const AB_H = 920;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="overview" title="uClimb · iOS Wireframes" subtitle="Bouldering social network — gritty wireframes, V-scale, hero achievement card. Drag artboards to reorder · click label or expand to focus.">
        <DCArtboard id="onboard" label="01 · Onboarding" width={AB_W} height={AB_H}>
          <InPhone><OnboardingScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="feed" label="02 · Feed" width={AB_W} height={AB_H}>
          <InPhone><FeedScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="story" label="03 · Story Viewer" width={AB_W} height={AB_H}>
          <InPhone dark><StoryViewerScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="composer" label="04 · Log a Send" width={AB_W} height={AB_H}>
          <InPhone><ComposerScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="profile" label="05 · Profile" width={AB_W} height={AB_H}>
          <InPhone><ProfileScreen /></InPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="social" title="Social · Events · Map" subtitle="Plan climbs, find the crew, see who's at your gym.">
        <DCArtboard id="events" label="06 · Events / Crag" width={AB_W} height={AB_H}>
          <InPhone><EventsScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="plan" label="07 · Plan a Climb" width={AB_W} height={AB_H}>
          <InPhone><PlanClimbScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="map" label="08 · Map" width={AB_W} height={AB_H}>
          <InPhone><MapScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="chats" label="09 · Group Chats" width={AB_W} height={AB_H}>
          <InPhone><ChatListScreen /></InPhone>
        </DCArtboard>
        <DCArtboard id="thread" label="10 · Group Thread" width={AB_W} height={AB_H}>
          <InPhone><ChatThreadScreen /></InPhone>
        </DCArtboard>
      </DCSection>

      <DCSection id="hero" title="Achievement Share Card · 3 directions" subtitle="The hero moment when you log a send. Each variant explores a different metaphor.">
        <DCArtboard id="cardA" label="A · STAT BLOCK" width={360} height={540}>
          <CardArtboard><ShareCardA /></CardArtboard>
        </DCArtboard>
        <DCArtboard id="cardB" label="B · SEND RECEIPT" width={360} height={540}>
          <CardArtboard><ShareCardB /></CardArtboard>
        </DCArtboard>
        <DCArtboard id="cardC" label="C · ROUTE TOPO" width={360} height={540}>
          <CardArtboard><ShareCardC /></CardArtboard>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
