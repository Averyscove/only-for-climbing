<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Only For Climbing — Interactive Mockup</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: radial-gradient(120% 80% at 50% 0%, #1a1714 0%, #0f0d0b 60%, #0a0908 100%); font-family: Inter, system-ui, sans-serif; color: #e2d9c8; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Stage layout */
  .stage {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 24px 24px 96px;
  }
  .stage-head {
    width: 100%; max-width: 920px; display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px 18px;
  }
  .stage-title {
    font-family: 'Archivo Black', Inter, sans-serif; letter-spacing: -0.5px; text-transform: uppercase;
    font-size: 18px; line-height: 1; color: #ece4d6;
  }
  .stage-title .dot { color: #e85d2a; }
  .stage-sub {
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px; letter-spacing: 1.5px;
    color: #9a907f; text-transform: uppercase; font-weight: 700;
  }
  .stage-screen-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #9a907f; padding: 4px 10px; border: 1px solid #2c2823; background: rgba(28,24,20,0.6); font-weight: 700;
  }

  .device-wrap {
    transform-origin: top center;
    transition: transform 220ms ease;
  }
  @media (max-width: 480px) {
    .device-wrap { transform: scale(0.86); }
    .stage { padding: 12px 6px 96px; }
  }

  /* Screen picker drawer */
  .picker-fab {
    position: fixed; right: 18px; bottom: 18px; z-index: 80;
    width: 54px; height: 54px; border-radius: 50%;
    background: #e85d2a; color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 28px rgba(232,93,42,0.45), 0 2px 0 #c43c0c;
    cursor: pointer; border: none; font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: 1.2px; font-size: 11px;
  }
  .picker-fab:hover { transform: translateY(-2px); }
  .picker-overlay {
    position: fixed; inset: 0; z-index: 70; background: rgba(8,7,6,0.7); backdrop-filter: blur(6px);
    opacity: 0; pointer-events: none; transition: opacity 200ms;
  }
  .picker-overlay.open { opacity: 1; pointer-events: auto; }
  .picker {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 75; width: min(380px, 92vw);
    background: #ece4d6; color: #13110e;
    box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    transform: translateX(100%); transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex; flex-direction: column;
  }
  .picker.open { transform: translateX(0); }
  .picker-head { padding: 18px 20px 10px; border-bottom: 1px solid #bfb4a0; display: flex; align-items: center; justify-content: space-between; }
  .picker-head .t { font-family: 'Archivo Black', Inter, sans-serif; font-size: 18px; letter-spacing: -0.4px; text-transform: uppercase; }
  .picker-head .x {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 800; letter-spacing: 1.5px;
    cursor: pointer; padding: 6px 10px; border: 1.5px solid #1a1714; background: transparent;
  }
  .picker-list { overflow-y: auto; padding: 10px 14px 24px; }
  .picker-section { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #5e564b; text-transform: uppercase; font-weight: 800; padding: 14px 6px 6px; }
  .picker-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 10px;
    border: 1px solid transparent;
    cursor: pointer;
    border-radius: 2px;
  }
  .picker-row:hover { background: #f6efe1; border-color: #bfb4a0; }
  .picker-row.active { background: #13110e; color: #fff; }
  .picker-row.active .num { background: #e85d2a; color: #fff; border-color: #e85d2a; }
  .picker-row .num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #1a1714; flex-shrink: 0;
  }
  .picker-row .meta .t { font-family: 'Archivo Black', Inter, sans-serif; font-size: 13px; letter-spacing: -0.2px; text-transform: uppercase; }
  .picker-row .meta .s { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px; opacity: 0.7; text-transform: uppercase; font-weight: 700; }

  /* Hint pill */
  .hint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; z-index: 60;
    padding: 10px 14px;
    background: rgba(28,24,20,0.85); color: #ece4d6;
    border: 1px solid #2c2823;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase;
    backdrop-filter: blur(8px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 280ms ease;
  }
  .hint.show { opacity: 1; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="src/ios-frame.jsx"></script>
<script type="text/babel" src="src/hifi/shared.jsx"></script>
<script type="text/babel" src="src/hifi/feed.jsx"></script>
<script type="text/babel" src="src/hifi/profile.jsx"></script>
<script type="text/babel" src="src/hifi/events.jsx"></script>
<script type="text/babel" src="src/hifi/chat.jsx"></script>
<script type="text/babel" src="src/hifi/share.jsx"></script>
<script type="text/babel" src="src/hifi/extras.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const PHONE_W = 390;
const PHONE_H = 844;

// Screen catalog — order = picker order
const SCREENS = [
  { id: 'onboarding', no: '01', label: 'Onboarding',     sub: 'Find your crew',           dark: true,  group: 'CORE',   render: () => <HFOnboardingScreen /> },
  { id: 'feed',       no: '02', label: 'Feed',           sub: 'Hero send · stories',      dark: false, group: 'CORE',   render: () => <HFFeedScreen /> },
  { id: 'story',      no: '03', label: 'Story Viewer',   sub: 'Live · stickers',          dark: true,  group: 'CORE',   render: () => <HFStoryView /> },
  { id: 'composer',   no: '04', label: 'Log a Send',     sub: 'Composer',                 dark: true,  group: 'CORE',   render: () => <HFComposerScreen /> },
  { id: 'profile',    no: '05', label: 'Profile',        sub: 'Stats · pyramid · sends',  dark: false, group: 'CORE',   render: () => <HFProfileScreen /> },
  { id: 'events',     no: '06', label: 'Discover',       sub: 'Events / map / gyms',      dark: false, group: 'SOCIAL', render: () => <HFEventsScreen /> },
  { id: 'plan',       no: '07', label: 'Plan a Climb',   sub: 'New event form',           dark: false, group: 'SOCIAL', render: () => <HFPlanScreen /> },
  { id: 'map',        no: '08', label: 'Map',            sub: 'Nearby gyms',              dark: false, group: 'SOCIAL', render: () => <HFMapScreen /> },
  { id: 'chats',      no: '09', label: 'Group Chats',    sub: 'Inbox',                    dark: false, group: 'SOCIAL', render: () => <HFChatListScreen /> },
  { id: 'thread',     no: '10', label: 'Crushers Crew',  sub: 'Group thread',             dark: false, group: 'SOCIAL', render: () => <HFGroupChatScreen /> },
  { id: 'shareA',     no: 'A',  label: 'Share · Stamped',sub: 'Certificate',              dark: false, group: 'SHARE',  render: () => <ShareCardArtboard><HFShareA /></ShareCardArtboard> },
  { id: 'shareB',     no: 'B',  label: 'Share · Editorial', sub: 'Full bleed',            dark: true,  group: 'SHARE',  render: () => <ShareCardArtboard><HFShareB /></ShareCardArtboard> },
  { id: 'shareC',     no: 'C',  label: 'Share · Newspaper', sub: 'Broadsheet',            dark: false, group: 'SHARE',  render: () => <ShareCardArtboard><HFShareC /></ShareCardArtboard> },
];

// Wraps a 360×720 share card so it sits visually on the same paper background as a phone-sized canvas.
function ShareCardArtboard({ children }) {
  return (
    <div style={{
      width: PHONE_W, height: PHONE_H,
      background: HF.paper,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{ boxShadow: '0 24px 48px rgba(0,0,0,0.25), 0 8px 16px rgba(0,0,0,0.18)' }}>
        {children}
      </div>
    </div>
  );
}

function ScreenPicker({ open, onClose, current, onPick }) {
  const groups = ['CORE', 'SOCIAL', 'SHARE'];
  return (
    <>
      <div className={'picker-overlay' + (open ? ' open' : '')} onClick={onClose} />
      <aside className={'picker' + (open ? ' open' : '')} aria-hidden={!open}>
        <div className="picker-head">
          <div className="t">SCREENS</div>
          <button className="x" onClick={onClose}>CLOSE ✕</button>
        </div>
        <div className="picker-list">
          {groups.map(g => (
            <div key={g}>
              <div className="picker-section">{g === 'CORE' ? '— Core flow —' : g === 'SOCIAL' ? '— Social · plan —' : '— Hero share cards —'}</div>
              {SCREENS.filter(s => s.group === g).map(s => (
                <div
                  key={s.id}
                  className={'picker-row' + (current === s.id ? ' active' : '')}
                  onClick={() => { onPick(s.id); onClose(); }}
                >
                  <div className="num">{s.no}</div>
                  <div className="meta">
                    <div className="t">{s.label}</div>
                    <div className="s">{s.sub}</div>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      </aside>
    </>
  );
}

function App() {
  const [screen, setScreen] = React.useState(() => {
    const fromHash = (window.location.hash || '').replace('#', '');
    return SCREENS.some(s => s.id === fromHash) ? fromHash : 'onboarding';
  });
  const [picker, setPicker] = React.useState(false);
  const [hint, setHint] = React.useState(true);

  // Expose navigation to the design components via window.UC.navigate
  React.useEffect(() => {
    window.UC = window.UC || {};
    window.UC.navigate = (s) => {
      if (SCREENS.some(x => x.id === s)) setScreen(s);
    };
  }, []);

  // Keep URL hash synced for deep links and back/forward.
  React.useEffect(() => {
    if (window.location.hash !== '#' + screen) {
      window.history.replaceState(null, '', '#' + screen);
    }
  }, [screen]);

  // Hash → state on back/forward.
  React.useEffect(() => {
    const onHash = () => {
      const s = (window.location.hash || '').replace('#', '');
      if (SCREENS.some(x => x.id === s)) setScreen(s);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Hide hint after a moment.
  React.useEffect(() => {
    const t = setTimeout(() => setHint(false), 4500);
    return () => clearTimeout(t);
  }, []);

  // Keyboard: ←/→ to flip screens, P to open picker.
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        const idx = SCREENS.findIndex(s => s.id === screen);
        if (idx === -1) return;
        const next = e.key === 'ArrowRight'
          ? SCREENS[(idx + 1) % SCREENS.length].id
          : SCREENS[(idx - 1 + SCREENS.length) % SCREENS.length].id;
        setScreen(next);
      } else if (e.key === 'p' || e.key === 'P') {
        setPicker(p => !p);
      } else if (e.key === 'Escape') {
        setPicker(false);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [screen]);

  const current = SCREENS.find(s => s.id === screen) || SCREENS[0];

  return (
    <div className="stage">
      <div className="stage-head">
        <div>
          <div className="stage-title">ONLY FOR CLIMBING<span className="dot">.</span></div>
          <div className="stage-sub" style={{ marginTop: 6 }}>INTERACTIVE MOCKUP · 13 SCREENS · IOS</div>
        </div>
        <div className="stage-screen-label">{current.no} · {current.label.toUpperCase()}</div>
      </div>

      <div className="device-wrap">
        <IOSDevice width={PHONE_W} height={PHONE_H} dark={current.dark}>
          {current.render()}
        </IOSDevice>
      </div>

      <button className="picker-fab" onClick={() => setPicker(true)} aria-label="Open screens picker">
        SCREENS
      </button>

      <ScreenPicker
        open={picker}
        onClose={() => setPicker(false)}
        current={screen}
        onPick={setScreen}
      />

      <div className={'hint' + (hint ? ' show' : '')}>
        TAP THE APP · USE TAB BAR · ← → TO FLIP · PRESS P FOR ALL SCREENS
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
